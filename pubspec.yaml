name: duas_fms_mobile
description: UAS/Drone Fleet Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3+1
  path: ^1.9.0
  connectivity_plus: ^6.0.3
  intl: ^0.20.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  supabase_flutter: ^2.8.0
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_face_detection: ^0.11.0
  image: ^4.2.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  network_info_plus: ^6.1.2
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3
  pdf: ^3.11.1
  printing: ^5.13.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0F1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
